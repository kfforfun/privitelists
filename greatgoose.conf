[Host]
# Apple 服务走系统 DNS，避免 DoH 污染或次优解析
*.icloud.com = server:system
*.apple.com = server:system
*.icloud-content.com = server:system
*.apple-cloudkit.com = server:system
*.me.com = server:system
localhost = 127.0.0.1

[URL Rewrite]

[MITM]
enable = true
# 注意：ca-p12 和 ca-passphrase 已移除，请在 Shadowrocket → 设置 → HTTPS 解密 中单独导入证书
# 原证书私钥不应存储在公开 GitHub 仓库的配置文件中
#hostname =
